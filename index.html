<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 감정 분석 맞춤형 도서 추천 서비스</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #e3f2fd, #fce4ec);
      font-family: Arial, sans-serif;
      color: #333;
    }

    .container {
      width: min(900px, 92%);
      margin: 40px auto;
      background: #ffffff;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.16);
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 28px;
      color: #1e88e5;
    }

    .subtitle {
      text-align: center;
      color: #777;
      margin-bottom: 28px;
      font-size: 14px;
    }

    .auth-box {
      max-width: 420px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    h2 {
      margin-top: 0;
      font-size: 22px;
      text-align: center;
    }

    input, select, textarea {
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #42a5f5;
      box-shadow: 0 0 0 3px rgba(66, 165, 245, 0.15);
    }

    textarea {
      width: 100%;
      min-height: 100px;
      resize: vertical;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 0 16px;
      height: 46px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.15s;
      font-weight: bold;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      transform: none;
    }

    .login-btn { background: #42a5f5; color: white; }
    .signup-btn { background: #7e57c2; color: white; }
    .logout-btn { background: #455a64; color: white; }
    .suggest-btn { background: #ff7043; color: white; width: 100%; height: 50px; font-size: 16px; margin-top: 10px; }
    .tts-btn { background: #26a69a; color: white; }
    .delete-btn { background: #ef5350; color: white; }
    .refresh-btn { background: #66bb6a; color: white; margin-bottom: 16px; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
      padding: 14px;
      border-radius: 16px;
      background: #f7f9fb;
    }

    .user-info { font-size: 14px; color: #555; }
    .status { min-height: 24px; margin-bottom: 14px; color: #1e88e5; font-size: 14px; font-weight: bold; }

    .input-group {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .list { display: flex; flex-direction: column; gap: 16px; }
   
    .item {
      padding: 20px;
      border-radius: 16px;
      background: #fcfdfe;
      border: 1px solid #edf1f5;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }

    .item-meta { font-size: 13px; color: #ff7043; font-weight: bold; margin-bottom: 6px; }
    .item-title { margin: 0 0 10px; font-size: 20px; font-weight: bold; color: #1a237e; }
    .item-section { margin: 8px 0; font-size: 14px; line-height: 1.5; }
    .item-section strong { color: #5c6bc0; }
    .item-date { margin-top: 12px; font-size: 12px; color: #999; }
   
    .item-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px dashed #ddd;
    }

    .notice {
      max-width: 420px;
      margin: 20px auto 0;
      padding: 14px;
      border-radius: 14px;
      background: #fff8e1;
      color: #6d4c41;
      font-size: 13px;
      line-height: 1.6;
    }

    .hidden { display: none; }
    audio { width: 100%; max-width: 300px; }

    @media (max-width: 700px) {
      .input-group { grid-template-columns: 1fr; }
      .item-footer { flex-direction: column; gap: 10px; align-items: stretch; }
      audio { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📚 마음 책방</h1>
    <div class="subtitle">내 나이와 감정에 딱 맞는 AI 도서 추천 및 오디오 가이드</div>

    <section id="authSection">
      <div class="auth-box">
        <h2>로그인 / 회원가입</h2>
        <input id="emailInput" type="email" placeholder="이메일 주소" />
        <input id="passwordInput" type="password" placeholder="비밀번호 (6자리 이상)" />
        <button class="login-btn" id="loginBtn">로그인</button>
        <button class="signup-btn" id="signupBtn">회원가입</button>
      </div>
      <div class="notice">
        수행평가 테스트 시, 처음 사용하는 이메일은 <strong>회원가입</strong>을 먼저 진행해 주세요.
      </div>
    </section>

    <section id="mainSection" class="hidden">
      <div class="top-bar">
        <div class="user-info">반가워요! 👤 <strong id="userEmail"></strong>님</div>
        <button class="logout-btn" id="logoutBtn">로그아웃</button>
      </div>

      <div style="margin-bottom: 30px; padding: 20px; background: #f7f9fb; border-radius: 18px;">
        <h3 style="margin-top:0; color:#333;">오늘의 추천 요청하기</h3>
        <div class="input-group">
          <input id="ageInput" type="number" min="1" max="120" placeholder="내 나이 입력 (예: 18)" />
          <select id="emotionSelect">
            <option value="행복하고 에너지가 넘치는">😊 행복함 / 활기참</option>
            <option value="지치고 무기력한">😴 지침 / 무기력함</option>
            <option value="우울하고 위로가 필요한">😢 우울함 / 위로필요</option>
            <option value="불안하고 생각이 많은">😰 불안함 / 잡생각많음</option>
            <option value="화가 나고 스트레스 받는">😡 화남 / 스트레스</option>
            <option value="평온하고 잔잔한">😌 평온함 / 고요함</option>
          </select>
        </div>
        <textarea id="detailInput" placeholder="현재 기분이나 상황을 조금 더 자세히 적어주시면 더 정확한 책을 추천해 드려요. (선택사항)"></textarea>
        <button class="suggest-btn" id="suggestBtn">🔮 AI 맞춤 도서 추천받기</button>
      </div>

      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 style="margin:0;">내 추천 히스토리 (DB 연동)</h3>
        <button class="refresh-btn" id="refreshBtn">🔄 기록 갱신</button>
      </div>
     
      <div id="status" class="status"></div>
      <div id="dataList" class="list"></div>
    </section>
  </div>

  <script type="module">
    // Firebase 라이브러리 로드
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getDatabase, ref, push, set, remove, onValue, off } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

    // [필수수정] Firebase Config 설정 (기존 정보 유지)
    const firebaseConfig = {        apiKey: "AIzaSyBlRB4kd3BexpRXTUGXJHnVSSjbyw-XjRU",
      authDomain: "gangt-b4142.firebaseapp.com",
      databaseURL: "https://gangt-b4142-default-rtdb.firebaseio.com",
      projectId: "gangt-b4142",
      storageBucket: "gangt-b4142.firebasestorage.app",
      messagingSenderId: "793543955998",
      appId: "1:793543955998:web:b649c5655f7b22460c800f",
      measurementId: "G-PGPR3B9QB1"
    };

    // [필수수정] 배포한 Google Apps Script Web App URL 입력
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxUH83aT0mIBp5YAYxUl_epUIYTCccyjmdOV2K4Z7Q_QqRMPz-QjwsErEIKNBNLDzmO/exec';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    // DOM 요소 정의
    const authSection = document.getElementById('authSection');
    const mainSection = document.getElementById('mainSection');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const signupBtn = document.getElementById('signupBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const userEmail = document.getElementById('userEmail');
   
    const ageInput = document.getElementById('ageInput');
    const emotionSelect = document.getElementById('emotionSelect');
    const detailInput = document.getElementById('detailInput');
    const suggestBtn = document.getElementById('suggestBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const dataList = document.getElementById('dataList');
    const statusBox = document.getElementById('status');

    let currentUser = null;
    let currentItemsRef = null;

    function setStatus(msg) { statusBox.textContent = msg; }

    // --- 1. Authentication (로그인/회원가입 구역) ---
    function getAuthData() {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
      if (!email || !password) { alert('이메일과 비밀번호를 입력하세요.'); return null; }
      if (password.length < 6) { alert('비밀번호는 6자리 이상이어야 합니다.'); return null; }
      return { email, password };
    }

    signupBtn.addEventListener('click', async () => {
      const cred = getAuthData(); if (!cred) return;
      try {
        await createUserWithEmailAndPassword(auth, cred.email, cred.password);
        alert('회원가입 성공!');
      } catch (e) { alert(getKoreanErrorMessage(e.code)); }
    });

    loginBtn.addEventListener('click', async () => {
      const cred = getAuthData(); if (!cred) return;
      try { await signInWithEmailAndPassword(auth, cred.email, cred.password); }
      catch (e) { alert(getKoreanErrorMessage(e.code)); }
    });

    logoutBtn.addEventListener('click', () => signOut(auth).catch(() => alert('로그아웃 실패')));

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        authSection.classList.add('hidden');
        mainSection.classList.remove('hidden');
        userEmail.textContent = user.email;
        startRealtimeListener(user.uid);
      } else {
        currentUser = null;
        authSection.classList.remove('hidden');
        mainSection.classList.add('hidden');
        stopRealtimeListener();
      }
    });

    // --- 2. AI 연동 및 데이터 처리 구역 ---
    suggestBtn.addEventListener('click', async () => {
      if (!currentUser) return;
      const age = ageInput.value.trim();
      const emotion = emotionSelect.value;
      const detail = detailInput.value.trim();

      if (!age) { alert('나이를 입력해주세요.'); return; }

      try {
        suggestBtn.disabled = true;
        suggestBtn.textContent = 'AI가 도서를 분석 및 추천 중...';
        setStatus('OpenAI API를 통해 감정 기반 맞춤 책을 추천받고 있습니다.');

        // 1단계: Google Apps Script에 AI 분석 및 추천 요청 (프롬프트 결합)
        const promptQuestion = `사용자 정보: 나이 ${age}세, 현재 감정 상태: "${emotion}". 추가 설명: "${detail}".
        이 사용자를 위로하거나 멘탈케어에 도움을 줄 수 있는 최고의 책 1권을 선정해서 추천해줘.
        답변은 반드시 아래 형식을 완벽하게 지켜서 작성해줘. 줄바꿈을 포함해줘.
       
        [추천 도서] 책 제목 (저자)
        [추천 이유] 여기에 나이와 감정을 기반으로 분석하여 추천하는 구체적인 이유 서술
        [책 내용 요약] 해당 책의 주요 내용 및 핵심 메시지 요약
        [도서 평가] 대중적 평가 혹은 이 책이 가지는 독창적인 가치에 대한 서술`;

        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ type: 'chat', question: promptQuestion })
        });

        const result = await response.json();
        if (result.error) throw new Error(result.error);

        const aiAnswer = result.answer;

        // 2단계: AI 답변에서 데이터 파싱 (정규식을 활용해 추출)
        const bookTitle = aiAnswer.match(/\[추천 도서\](.*?)(\n|$)/)?.[1]?.trim() || "추천 도서";
        const reason = aiAnswer.match(/\[추천 이유\]([\s\S]*?)(?=\[책 내용 요약\]|\[도서 평가\]|$)/)?.[1]?.trim() || "분석 완료";
        const summary = aiAnswer.match(/\[책 내용 요약\]([\s\S]*?)(?=\[도서 평가\]|$)/)?.[1]?.trim() || "내용 요약";
        const review = aiAnswer.match(/\[도서 평가\]([\s\S]*?)$/)?.[1]?.trim() || "좋은 평가";

        setStatus('AI 추천 완료! Firebase Realtime Database에 저장합니다.');

        // 3단계: Firebase DB에 결과 저장 (필수요소: 연동 및 저장)
        const itemsRef = ref(database, `users/${currentUser.uid}/books`);
        const newItemRef = push(itemsRef);
        await set(newItemRef, {
          age, emotion, bookTitle, reason, summary, review,
          createdAt: new Date().toLocaleString('ko-KR')
        });

        // 입력창 비우기
        detailInput.value = '';
        setStatus('성공적으로 저장되었습니다.');

      } catch (e) {
        console.error(e);
        alert('추천을 가져오거나 저장하는데 실패했습니다:\n' + e.message);
        setStatus('작업 실패');
      } finally {
        suggestBtn.disabled = false;
        suggestBtn.textContent = '🔮 AI 맞춤 도서 추천받기';
      }
    });

    // --- 3. 실시간 Firebase DB 리스너 구역 ---
    function startRealtimeListener(uid) {
      stopRealtimeListener();
      setStatus('데이터 로딩 중...');
      currentItemsRef = ref(database, `users/${uid}/books`);

      onValue(currentItemsRef, (snapshot) => {
        renderData(snapshot.val());
        setStatus('실시간 동기화 완료');
      }, (e) => {
        setStatus('DB를 불러오지 못했습니다. 규칙을 확인하세요.');
      });
    }

    function stopRealtimeListener() {
      if (currentItemsRef) { off(currentItemsRef); currentItemsRef = null; }
    }

    refreshBtn.addEventListener('click', () => currentUser && startRealtimeListener(currentUser.uid));

    // 데이터 화면에 뿌려주기
    function renderData(data) {
      dataList.innerHTML = '';
      if (!data) {
        dataList.innerHTML = '<div style="text-align:center; padding:30px; color:#888;">아직 추천받은 도서 기록이 없습니다.</div>';
        return;
      }

      Object.entries(data).reverse().forEach(([id, item]) => {
        const div = document.createElement('div');
        div.className = 'item';
       
        // TTS로 읽어줄 텍스트 병합 생성
        const ttsText = `추천 도서는 ${item.bookTitle} 입니다. 추천 이유, ${item.reason} 책 내용, ${item.summary} 도서 평가, ${item.review}`;

        div.innerHTML = `
          <div class="item-meta">상태: ${item.age}세 / ${escapeHTML(item.emotion)} 기분</div>
          <div class="item-title">📖 ${escapeHTML(item.bookTitle)}</div>
          <div class="item-section"><strong>💡 추천 이유:</strong> ${escapeHTML(item.reason)}</div>
          <div class="item-section"><strong>📝 내용 요약:</strong> ${escapeHTML(item.summary)}</div>
          <div class="item-section"><strong>⭐ 도서 평가:</strong> ${escapeHTML(item.review)}</div>
          <div class="item-date">진단 일시: ${item.createdAt}</div>
         
          <div class="item-footer">
            <button class="tts-btn" onclick="playBookTTS(this, \`${escapeForAttribute(ttsText)}\`)">🔊 AI 음성 가이드 듣기</button>
            <button class="delete-btn" onclick="deleteBook('${id}')">삭제</button>
          </div>
          <div class="audio-container" style="margin-top:10px;"></div>
        `;
        dataList.appendChild(div);
      });
    }

    // --- 4. TTS 실행 기능 구역 ---
    window.playBookTTS = async function(btn, text) {
      try {
        btn.disabled = true;
        btn.textContent = '음성 생성 중...';
       
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ type: 'tts', text: text, model: 'tts-1', voice: 'nova', speed: 1.0 })
        });
       
        const data = await response.json();
        if (data.error) throw new Error(data.error);

        // Base64 데이터를 Audio 플레이어로 변환
        const audioUrl = base64ToAudioUrl(data.audioBase64, 'audio/mpeg');
        const container = btn.parentElement.nextElementSibling;
        container.innerHTML = `<audio src="${audioUrl}" controls autoplay></audio>`;
       
      } catch (e) {
        alert('TTS 생성 실패: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '🔊 AI 음성 가이드 듣기';
      }
    };

    window.deleteBook = async function(id) {
      if (!confirm('이 기록을 삭제하시겠습니까?')) return;
      try { await remove(ref(database, `users/${currentUser.uid}/books/${id}`)); }
      catch(e) { alert('삭제 실패'); }
    };

    // 헬퍼 함수군
    function base64ToAudioUrl(base64, mimeType) {
      const byteCharacters = atob(base64);
      const byteArrays = [];
      for (let offset = 0; offset < byteCharacters.length; offset += 512) {
        const slice = byteCharacters.slice(offset, offset + 512);
        const byteNumbers = new Array(slice.length);
        for (let i = 0; i < slice.length; i++) { byteNumbers[i] = slice.charCodeAt(i); }
        byteArrays.push(new Uint8Array(byteNumbers));
      }
      return URL.createObjectURL(new Blob(byteArrays, { type: mimeType }));
    }

    function escapeHTML(text) {
      return String(text).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');
    }
    function escapeForAttribute(text) {
      return escapeHTML(text).replaceAll('`','&#096;').replaceAll('\n', ' ').replaceAll('\r', ' ');
    }

    function getKoreanErrorMessage(code) {
      switch (code) {
        case 'auth/email-already-in-use': return '이미 가입된 이메일입니다.';
        case 'auth/invalid-email': return '이메일 형식이 올바르지 않습니다.';
        case 'auth/weak-password': return '비밀번호를 6자리 이상으로 해주세요.';
        case 'auth/invalid-credential': return '이메일 또는 비밀번호를 잘못 입력하셨습니다.';
        default: return `오류 발생: ${code}`;
      }
    }
  </script>
</body>
</html>
